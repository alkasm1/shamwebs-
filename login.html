<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تسجيل الدخول - Sham Webs</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBaP41WGX2eLVIUvf0r9lt2BjaECh_RADs",
      authDomain: "sham-webs-410bc.firebaseapp.com",
      projectId: "sham-webs-410bc",
      storageBucket: "sham-webs-410bc.appspot.com",
      messagingSenderId: "906019058653",
      appId: "1:906019058653:web:c228bf25fb4a0c9f627c34"
    };
    firebase.initializeApp(firebaseConfig);
  </script>
</head>

<body>
  <section class="auth-container">
    <h2>تسجيل الدخول</h2>
    <form action="dashboard/index.html" method="post">
      <label for="username">اسم المستخدم أو رقم الهاتف:</label>
      <input type="text" id="username" required>

      <label for="password">كلمة المرور:</label>
      <input type="password" id="password" required>

      <button type="submit">دخول</button>
    </form>

    <hr>
    <p style="text-align:center;">أو يمكنك التسجيل عبر حساب Gmail:</p>
    <div style="text-align:center; margin-top:10px;">
      <button id="googleLogin" style="background-color:#db4437; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">
        تسجيل الدخول بـ Google
      </button>
    </div>

    <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
  </section>

  <script>
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    document.getElementById("googleLogin").addEventListener("click", () => {
      alert("📲 سيتم توجيهك لتسجيل الدخول عبر Google...");
      auth.signInWithRedirect(provider);
    });
  </script>
</body>
</html>
